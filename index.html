<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Flower</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    select, input, button {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      text-align: center;
    }

    #flower-image {
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    #credit {
      font-size: 14px;
      color: #555;
    }

    #credit a {
      color: #0070f3;
      text-decoration: none;
    }

    #credit a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>🌸 Life Flower 🌸</h1>

  <!-- 언어 선택 -->
  <label for="lang-select">언어 선택:</label>
  <select id="lang-select">
    <option value="ko">한국어</option>
    <option value="en">English</option>
  </select>

  <!-- 꽃 이름 입력 -->
  <input type="text" id="flower-input" placeholder="꽃 이름을 입력하세요" />

  <!-- 버튼 -->
  <button id="generate-btn">이미지 불러오기</button>

  <!-- 결과 영역 -->
  <div id="result">
    <img id="flower-image" />
    <p id="credit"></p>
  </div>

  <script>
    document.getElementById('generate-btn').addEventListener('click', async () => {
      const flowerName = document.getElementById('flower-input').value;
      const lang = document.getElementById('lang-select').value;

      if (!flowerName) {
        alert('꽃 이름을 입력해주세요!');
        return;
      }

      const res = await fetch('/api/generate-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ flowerName, lang }),
      });

      const data = await res.json();

      if (data.imageDataUrl) {
        document.getElementById('flower-image').src = data.imageDataUrl;
        document.getElementById('credit').innerHTML =
          `Photo by <a href="${data.photographerLink}" target="_blank">${data.photographer}</a> on <a href="https://unsplash.com" target="_blank">Unsplash</a>`;
      } else {
        document.getElementById('flower-image').src = '';
        document.getElementById('credit').innerText = '이미지를 가져올 수 없습니다.';
      }
    });
  </script>
</body>
</html>
