<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 탄생화 알아보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gowun Batang', serif;
        }
        /* 한지 질감 배경 */
        .hanji-background {
            background-color: #f3f0e8;
            background-image:
                linear-gradient(rgba(224, 213, 194, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(224, 213, 194, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* 전통 문양을 닮은 버튼 */
        .korean-button {
            background-color: #8c5b40; /* 깊은 갈색 */
            color: #f3f0e8; /* 미색 */
            border: 2px solid #5a3a29;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .korean-button:hover:not(:disabled) {
            background-color: #a26a4a;
            transform: translateY(-2px);
            box-shadow: 4px 4px 8px rgba(0,0,0,0.2);
        }
        .korean-button:disabled {
            background-color: #b0a191;
            cursor: not-allowed;
        }
        /* 인스타그램 스토리 사이즈 (9:16) */
        .story-size {
            width: 100%;
            max-width: 360px; /* 일반적인 모바일 화면 너비 */
            aspect-ratio: 9 / 16;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .story-background {
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="hanji-background min-h-screen flex items-center justify-center p-4">

    <!-- 시작 페이지 -->
    <div id="start-page" class="w-full max-w-md text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-[#5a3a29] mb-3">나의 탄생화 알아보기</h1>
        <p class="text-lg text-[#6d5d4b] mb-10">당신이 태어난 날에 숨겨진 특별한 의미를 찾아보세요.</p>

        <div class="bg-[#fdfbf5] p-8 rounded-lg shadow-lg border border-[#dcd3c3]">
            <div class="mb-6">
                <label for="month" class="block text-left text-lg text-[#5a3a29] mb-2">태어난 달</label>
                <select id="month" class="w-full p-3 bg-white border border-[#dcd3c3] rounded-md text-lg focus:outline-none focus:ring-2 focus:ring-[#8c5b40]">
                    <!-- 월 옵션은 JS로 추가 -->
                </select>
            </div>
            <div class="mb-8">
                <label for="day" class="block text-left text-lg text-[#5a3a29] mb-2">태어난 날</label>
                <select id="day" class="w-full p-3 bg-white border border-[#dcd3c3] rounded-md text-lg focus:outline-none focus:ring-2 focus:ring-[#8c5b40]">
                    <!-- 일 옵션은 JS로 추가 -->
                </select>
            </div>
            <button id="show-result-button" class="korean-button w-full py-4 text-xl font-bold rounded-lg">나의 탄생화 확인하기</button>
        </div>
    </div>

    <!-- 결과 페이지 -->
    <div id="result-page" class="hidden w-full max-w-md text-center">
        <!-- 인스타 스토리 공유 영역 -->
        <div id="capture-area" class="story-size bg-gray-200 flex flex-col justify-between p-8 text-center text-white">
            <!-- 배경 이미지 영역 -->
            <div id="result-background" class="absolute inset-0 story-background transition-all duration-500 ease-in-out"></div>
            
            <!-- 로딩 오버레이 -->
            <div id="loading-overlay" class="hidden absolute inset-0 bg-black bg-opacity-60 flex flex-col items-center justify-center z-20 transition-opacity duration-300">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-white"></div>
                <p class="text-white mt-4 text-lg">민화 이미지를 생성 중입니다...</p>
            </div>

            <!-- 콘텐츠 영역 -->
            <div id="result-content" class="z-10 relative opacity-0 transition-opacity duration-500 h-full flex flex-col justify-between">
                <div>
                    <div>
                        <p id="result-date" class="text-xl opacity-80"></p>
                        <h2 id="result-flower-name" class="text-4xl font-bold mt-1" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);"></h2>
                    </div>
                    <div class="mt-8">
                        <p id="result-keywords" class="text-lg font-bold" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.7);"></p>
                        <p id="daily-zodiac" class="text-base opacity-90 mb-3" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.7);"></p>
                        <p id="result-description" class="text-base leading-relaxed bg-black bg-opacity-30 p-3 rounded-lg"></p>
                    </div>
                </div>

                <div>
                    <div id="compatibility-section" class="hidden text-sm bg-black bg-opacity-30 p-3 rounded-lg">
                        <div class="flex justify-around">
                            <div>
                                <p class="opacity-80">💚 잘 맞는 궁합</p>
                                <p id="good-match-flower" class="font-bold text-base"></p>
                            </div>
                            <div>
                                <p class="opacity-80">💔 아쉬운 궁합</p>
                                <p id="bad-match-flower" class="font-bold text-base"></p>
                            </div>
                        </div>
                    </div>

                    <p class="mt-4 text-sm opacity-70">온기(溫技)</p>
                </div>
            </div>
        </div>

        <div class="mt-6 flex flex-col space-y-3">
             <button id="share-button" class="korean-button w-full py-3 text-lg font-bold rounded-lg">인스타그램에 공유하기</button>
             <button id="retry-button" class="w-full py-3 text-lg font-bold rounded-lg bg-[#dcd3c3] text-[#5a3a29] hover:bg-[#c9bfad] transition">다시하기</button>
        </div>
    </div>
    
    <!-- 공유 안내 모달 -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-[#fdfbf5] rounded-lg p-8 text-center max-w-sm w-full shadow-xl">
            <h3 class="text-2xl font-bold text-[#5a3a29] mb-4">공유하는 방법</h3>
            <p class="text-lg text-[#6d5d4b] mb-6">아래 버튼으로 이미지를 저장한 후,<br>인스타그램 스토리에 공유해보세요!</p>
            <a id="download-link" href="#" download="나의_탄생화.png" class="korean-button w-full py-3 text-lg font-bold rounded-lg block mb-3">이미지 저장하기</a>
            <button id="close-modal-button" class="w-full py-3 text-lg font-bold rounded-lg bg-[#dcd3c3] text-[#5a3a29] hover:bg-[#c9bfad] transition">닫기</button>
        </div>
    </div>


    <script>
        const birthFlowers = {
            '1-1': { name: '스노드롭', keywords: '#희망 #위안', description: '혹독한 겨울을 이겨내고 피어나는 당신은 주변에 희망을 주는 사람입니다.', goodMatch: '노랑 수선화', badMatch: '해바라기' },
            '1-2': { name: '노랑 수선화', keywords: '#사랑에답하여', description: '따뜻한 마음으로 상대방의 사랑에 화답할 줄 아는 진실한 사람입니다.', goodMatch: '스노드롭', badMatch: '능소화' },
            '1-3': { name: '사프란', keywords: '#후회없는청춘', description: '매 순간을 열정적으로 살아가며 후회 없는 청춘을 만들어가는 당신입니다.', goodMatch: '히아신스', badMatch: '석류' },
            '1-4': { name: '히아신스', keywords: '#차분한사랑', description: '요란하지 않지만 깊고 은은하게, 차분한 사랑을 할 줄 아는 사람입니다.', goodMatch: '사프란', badMatch: '진달래' },
            '1-5': { name: '서양톱풀', keywords: '#지도', description: '명확한 판단력과 통찰력으로 주변 사람들을 이끌어주는 리더십을 가졌습니다.', goodMatch: '흰 제비꽃', badMatch: '시스투스' },
            '1-6': { name: '흰 제비꽃', keywords: '#순진무구한사랑', description: '순수하고 꾸밈없는 마음으로 사랑을 표현하는 순수한 영혼의 소유자입니다.', goodMatch: '서양톱풀', badMatch: '이끼' },
            '1-7': { name: '튤립', keywords: '#실연', description: '아픔을 겪더라도, 그 경험을 통해 더 성숙하고 단단해지는 사람입니다.', goodMatch: '보랏빛 제비꽃', badMatch: '빨강 무늬 제라늄' },
            '1-8': { name: '보랏빛 제비꽃', keywords: '#사랑', description: '사랑이라는 감정을 무엇보다 소중히 여기며, 온 마음을 다해 사랑합니다.', goodMatch: '튤립', badMatch: '협죽도' },
            '1-9': { name: '노랑 제비꽃', keywords: '#수줍은사랑', description: '마음을 쉽게 표현하지는 못하지만, 수줍음 속에 진실한 사랑을 품고 있습니다.', goodMatch: '회양목', badMatch: '골든 로드' },
            '1-10': { name: '회양목', keywords: '#참고견뎌냄', description: '어떤 어려움이 닥쳐도 묵묵히 참고 견뎌내며 결국 이겨내는 힘이 있습니다.', goodMatch: '노랑 제비꽃', badMatch: '저먼더' },
            '1-11': { name: '측백나무', keywords: '#견고한우정', description: '한 번 맺은 인연을 소중히 여기며 변치 않는 견고한 우정을 나눕니다.', goodMatch: '향기 알리섬', badMatch: '해바라기' },
            '1-12': { name: '향기 알리섬', keywords: '#빼어난미모', description: '외면과 내면의 아름다움이 조화를 이루어 사람들의 시선을 사로잡습니다.', goodMatch: '측백나무', badMatch: '타마린드' },
            '1-13': { name: '수선화', keywords: '#신비', description: '속마음을 쉽게 드러내지 않아 신비로운 매력을 풍기는 사람입니다.', goodMatch: '시클라멘', badMatch: '튤립나무' },
            '1-14': { name: '시클라멘', keywords: '#내성적성격', description: '조용하고 내성적이지만, 그 안에 누구보다 깊고 풍부한 감성을 지니고 있습니다.', goodMatch: '수선화', badMatch: '접시꽃' },
            '1-15': { name: '가시', keywords: '#엄격', description: '자신과 타인에게 엄격한 기준을 가지고 있지만, 그만큼 책임감이 강합니다.', goodMatch: '노랑 히아신스', badMatch: '로사 캠피온' },
            '1-16': { name: '노랑 히아신스', keywords: '#승부', description: '목표를 향한 강한 승부욕을 가지고 있으며, 도전을 두려워하지 않습니다.', goodMatch: '가시', badMatch: '프리지아' },
            '1-17': { name: '수영', keywords: '#친근한정', description: '누구에게나 다정하고 친근하게 다가가 따뜻한 정을 나누는 사람입니다.', goodMatch: '어저귀', badMatch: '짚신나물' },
            '1-18': { name: '어저귀', keywords: '#억측', description: '섣부른 판단이나 억측을 경계하며, 모든 것을 신중하게 생각합니다.', goodMatch: '수영', badMatch: '스피리아' },
            '1-19': { name: '소나무', keywords: '#불로장수', description: '늘 푸른 소나무처럼 건강하고 활기찬 에너지로 가득한 사람입니다.', goodMatch: '미나리아재비', badMatch: '서양종 보리수' },
            '1-20': { name: '미나리아재비', keywords: '#천진난만', description: '아이처럼 순수하고 천진난만한 매력으로 주변을 밝게 만듭니다.', goodMatch: '소나무', badMatch: '금잔화' },
            '1-21': { name: '담쟁이덩굴', keywords: '#우정', description: '한번 뿌리내리면 변치 않는 담쟁이덩굴처럼 깊은 우정을 중요시합니다.', goodMatch: '이끼', badMatch: '안스륨' },
            '1-22': { name: '이끼', keywords: '#모성애', description: '주변 사람들을 따뜻하게 보살피고 감싸주는 깊은 모성애를 가졌습니다.', goodMatch: '담쟁이덩굴', badMatch: '하이포시스 오리어' },
            '1-23': { name: '부들', keywords: '#순종', description: '부드러운 마음으로 다른 사람의 의견을 존중하고 따를 줄 아는 사람입니다.', goodMatch: '가을에 피는 사프란', badMatch: '오미자' },
            '1-24': { name: '가을에 피는 사프란', keywords: '#절도의미', description: '화려함 속에서도 절제할 줄 아는, 내면의 아름다움을 가진 사람입니다.', goodMatch: '부들', badMatch: '에린지움' },
            '1-25': { name: '점나도나물', keywords: '#순진', description: '세상 물정에 때묻지 않은 순수하고 깨끗한 마음을 간직하고 있습니다.', goodMatch: '미모사', badMatch: '꽃담배' },
            '1-26': { name: '미모사', keywords: '#예민한마음', description: '섬세하고 예민한 감수성을 지녀 작은 것에서도 깊은 감동을 느낍니다.', goodMatch: '점나도나물', badMatch: '저먼더' },
            '1-27': { name: '마가목', keywords: '#게으름없는마음', description: '맡은 바를 성실하게 해내는 부지런함과 책임감을 동시에 갖췄습니다.', goodMatch: '검은 포플라', badMatch: '토끼풀' },
            '1-28': { name: '검은 포플라', keywords: '#용기', description: '어려움 앞에서도 물러서지 않고 맞서는 용기를 가진 사람입니다.', goodMatch: '마가목', badMatch: '호랑이꽃' },
            '1-29': { name: '이끼', keywords: '#모성애', description: '포근한 이끼처럼 주변을 감싸 안는 따뜻하고 깊은 마음의 소유자입니다.', goodMatch: '매쉬 메리골드', badMatch: '멕시칸 아이비' },
            '1-30': { name: '매쉬 메리골드', keywords: '#반드시올행복', description: '긍정적인 마음으로, 반드시 찾아올 행복을 믿고 기다릴 줄 아는 사람입니다.', goodMatch: '이끼', badMatch: '과꽃' },
            '1-31': { name: '노란 사프란', keywords: '#청춘의환희', description: '밝고 활기찬 에너지로 청춘의 기쁨을 마음껏 누리는 사람입니다.', goodMatch: '앵초', badMatch: '용담' },
            '2-1': { name: '앵초', keywords: '#젊은시절과고뇌', description: '젊은 날의 고뇌를 통해 더욱 깊고 성숙한 사람으로 성장합니다.', goodMatch: '모과', badMatch: '흰색 국화' },
            '2-2': { name: '모과', keywords: '#평범', description: '화려하지는 않지만 묵묵히 자신의 자리를 지키는 평범함 속의 특별함을 가졌습니다.', goodMatch: '앵초', badMatch: '칼라' },
            '2-3': { name: '황새냉이', keywords: '#그대에게바친다', description: '자신이 가진 소중한 것을 아낌없이 내어줄 줄 아는 헌신적인 사람입니다.', goodMatch: '빨간 앵초', badMatch: '샤프란' },
            '2-4': { name: '빨간 앵초', keywords: '#돌보지않는아름다움', description: '꾸미지 않아도 자연스럽게 빛나는, 본연의 아름다움을 지니고 있습니다.', goodMatch: '황새냉이', badMatch: '네리네' },
            '2-5': { name: '양치', keywords: '#사랑스러움', description: '작은 행동 하나하나에 사랑스러움이 배어있어 주변을 미소 짓게 만듭니다.', goodMatch: '바위솔', badMatch: '헤더' },
            '2-6': { name: '바위솔', keywords: '#가사에근면', description: '자신에게 주어진 일을 성실하고 꾸준하게 해내는 근면한 사람입니다.', goodMatch: '양치', badMatch: '아르메리아' },
            '2-7': { name: '물망초', keywords: '#나를잊지말아요', description: '한 번 맺은 인연을 깊고 소중하게 생각하는, 기억에 오래 남는 사람입니다.', goodMatch: '범의귀', badMatch: '뷰글라스' },
            '2-8': { name: '범의귀', keywords: '#절실한애정', description: '사랑에 있어 누구보다 진실하고 절실한 마음으로 상대를 대합니다.', goodMatch: '물망초', badMatch: '에리카' },
            '2-9': { name: '은매화', keywords: '#사랑의속삭임', description: '달콤하고 부드러운 말로 사랑을 속삭일 줄 아는 로맨티스트입니다.', goodMatch: '서향', badMatch: '산쑥' },
            '2-10': { name: '서향', keywords: '#영광', description: '자신의 분야에서 뛰어난 재능을 발휘하여 영광스러운 성취를 이룹니다.', goodMatch: '은매화', badMatch: '나팔꽃' },

        const startPage = document.getElementById('start-page');
        const resultPage = document.getElementById('result-page');
        const monthSelect = document.getElementById('month');
        const daySelect = document.getElementById('day');
        const showResultButton = document.getElementById('show-result-button');
        const retryButton = document.getElementById('retry-button');
        const shareButton = document.getElementById('share-button');
        const modal = document.getElementById('modal');
        const closeModalButton = document.getElementById('close-modal-button');
        const loadingOverlay = document.getElementById('loading-overlay');
        const resultContent = document.getElementById('result-content');

        function populateSelectors() {
            for (let i = 1; i <= 12; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `${i}월`;
                monthSelect.appendChild(option);
            }
            updateDays();
            monthSelect.addEventListener('change', updateDays);
        }

        function updateDays() {
            const year = new Date().getFullYear();
            const month = parseInt(monthSelect.value);
            const daysInMonth = new Date(year, month, 0).getDate();
            daySelect.innerHTML = '';
            for (let i = 1; i <= daysInMonth; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `${i}일`;
                daySelect.appendChild(option);
            }
        }
        
        function getDailyZodiac(month, day) {
            const year = new Date().getFullYear();
            const stems = ['갑', '을', '병', '정', '무', '기', '경', '신', '임', '계'];
            const branches = ['자(쥐)', '축(소)', '인(호랑이)', '묘(토끼)', '진(용)', '사(뱀)', '오(말)', '미(양)', '신(원숭이)', '유(닭)', '술(개)', '해(돼지)'];
            const refDate = new Date(2024, 0, 1);
            const targetDate = new Date(year, month - 1, day);
            const timeDiff = targetDate.getTime() - refDate.getTime();
            const dayDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
            const stemIndex = (dayDiff + 2 + 10) % 10;
            const branchIndex = (dayDiff + 4 + 12) % 12;
            return `태어난 날의 기운: ${stems[stemIndex]}${branches[branchIndex]}`;
        }

        async function generateImage(flowerName) {
            try {
                const response = await fetch('/api/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flowerName: flowerName })
                });

                if (!response.ok) { 
                    throw new Error(`HTTP error! status: ${response.status}`); 
                }

                const result = await response.json();
                
                if (result.imageDataUrl) {
                    return result.imageDataUrl;
                } else { 
                    throw new Error('Invalid response structure from API.'); 
                }
            } catch (error) {
                console.error("Image generation failed:", error);
                
                // Fallback: Return an inline SVG gradient background
                const svgGradient = `
                    <svg width="360" height="640" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#f3f0e8;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#e8dcc6;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#d4c4a8;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#grad1)"/>
                        <text x="180" y="320" font-family="serif" font-size="24" text-anchor="middle" fill="#8c5b40">
                            ${flowerName}
                        </text>
                    </svg>
                `;
                
                return `data:image/svg+xml;base64,${btoa(svgGradient)}`;
            }
        }
        
        showResultButton.addEventListener('click', async () => {
            const month = monthSelect.value;
            const day = daySelect.value;
            const key = `${month}-${day}`;
            const flowerData = birthFlowers[key];
            
            if (!flowerData) {
                alert("선택하신 날짜의 탄생화 정보를 찾을 수 없습니다.");
                return;
            }

            startPage.classList.add('hidden');
            resultPage.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');
            resultContent.classList.add('opacity-0');
            showResultButton.disabled = true;

            const imageUrl = await generateImage(flowerData.name);

            document.getElementById('daily-zodiac').textContent = getDailyZodiac(month, day);
            document.getElementById('result-date').textContent = `${month}월 ${day}일의 당신`;
            document.getElementById('result-flower-name').textContent = flowerData.name;
            document.getElementById('result-keywords').textContent = flowerData.keywords;
            document.getElementById('result-description').textContent = flowerData.description;
            document.getElementById('result-background').style.backgroundImage = `url(${imageUrl})`;
            
            const compatibilitySection = document.getElementById('compatibility-section');
            if (flowerData.goodMatch && flowerData.badMatch) {
                document.getElementById('good-match-flower').textContent = flowerData.goodMatch;
                document.getElementById('bad-match-flower').textContent = flowerData.badMatch;
                compatibilitySection.classList.remove('hidden');
            } else {
                compatibilitySection.classList.add('hidden');
            }
            
            loadingOverlay.classList.add('hidden');
            resultContent.classList.remove('opacity-0');
            showResultButton.disabled = false;
        });

        retryButton.addEventListener('click', () => {
            resultPage.classList.add('hidden');
            startPage.classList.remove('hidden');
            resultContent.classList.add('opacity-0');
            document.getElementById('result-background').style.backgroundImage = 'none';
        });
        
        shareButton.addEventListener('click', async () => {
            shareButton.textContent = "이미지 준비 중...";
            shareButton.disabled = true;

            try {
                const captureArea = document.getElementById('capture-area');
                const canvas = await html2canvas(captureArea, {
                    useCORS: true, 
                    backgroundColor: null,
                    scale: window.devicePixelRatio || 2
                });
                const imageUrl = canvas.toDataURL('image/png');
                
                const downloadLink = document.getElementById('download-link');
                downloadLink.href = imageUrl;
                
                modal.classList.remove('hidden');

            } catch (error) {
                console.error('Error capturing image:', error);
                alert('이미지 저장에 실패했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                shareButton.textContent = "인스타그램에 공유하기";
                shareButton.disabled = false;
            }
        });
        
        closeModalButton.addEventListener('click', () => {
            modal.classList.add('hidden');
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                modal.classList.add('hidden');
            }
        });

        populateSelectors();
    </script>
